<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Devolución y Mala Producción — Isopan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --maroon-900:#4a1010;
    --maroon-800:#5c1616;
    --maroon-700:#6f1c1c;
    --maroon-600:#7d2323;
    --gold:#c8920a;
    --cream:#fdfaf3;
    --paper:#ffffff;
    --ink:#2b1a12;
    --ink-soft:#6b5a4e;
    --line:#e7ddc9;
    --pink:#e9d3d3;
    --ok:#2f7d4f;
    --warn:#b3541e;
    --danger:#a12525;
    --radius:10px;
    --shadow:0 1px 2px rgba(74,16,16,.06), 0 4px 14px rgba(74,16,16,.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--cream);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gold);color:#fff;}

  /* Header */
  header.topbar{
    display:flex;align-items:center;gap:14px;
    padding:14px 22px;background:var(--paper);
    border-bottom:2px solid var(--maroon-800);
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand svg{width:26px;height:26px;flex:none;}
  .brand-name{font-weight:800;letter-spacing:.04em;color:var(--maroon-800);font-size:19px;}
  .brand-sub{font-size:11px;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;margin-top:-2px;}
  .topbar-actions{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .status-pill{
    font-size:11.5px;padding:5px 10px;border-radius:20px;
    background:#f4ede0;color:var(--ink-soft);border:1px solid var(--line);
    display:flex;align-items:center;gap:6px;
  }
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);}
  .status-dot.stale{background:var(--warn);}
  .status-dot.off{background:var(--danger);}
  button.btn{
    font:inherit;font-size:13px;font-weight:600;border-radius:8px;
    padding:8px 14px;border:1px solid var(--maroon-800);
    background:var(--maroon-800);color:#fff;cursor:pointer;
    transition:transform .1s ease, background .15s ease;
  }
  button.btn:hover{background:var(--maroon-700);}
  button.btn:active{transform:scale(.97);}
  button.btn.ghost{background:transparent;color:var(--maroon-800);}
  button.btn.ghost:hover{background:#f4ede0;}
  input[type=file]{display:none;}

  /* Filters */
  .filterbar{
    display:flex;flex-wrap:wrap;gap:10px;
    padding:14px 22px;background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .filter-field{
    display:flex;flex-direction:column;gap:4px;
    background:var(--cream);border:1px solid var(--line);
    border-radius:8px;padding:6px 10px;min-width:150px;
  }
  .filter-field label{font-size:10px;font-weight:700;color:var(--maroon-700);text-transform:uppercase;letter-spacing:.05em;}
  .filter-field select, .filter-field input{
    border:none;background:transparent;font:inherit;font-size:13.5px;
    color:var(--ink);outline:none;padding:1px 0;
  }
  .filter-field.daterange{flex-direction:row;align-items:center;gap:8px;min-width:280px;}
  .filter-field.daterange > div{display:flex;flex-direction:column;gap:2px;}
  select[multiple]{min-height:34px;}
  .reset-filters{
    align-self:center;font-size:12.5px;color:var(--maroon-700);
    background:none;border:none;cursor:pointer;text-decoration:underline;
    font-weight:600;
  }

  /* Layout */
  main{
    display:grid;
    grid-template-columns:minmax(0,1.55fr) minmax(320px,1fr);
    gap:16px;padding:16px 22px 40px;
    align-items:start;
  }
  @media (max-width:980px){ main{grid-template-columns:1fr;} }

  .panel{
    background:var(--paper);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden;
  }
  .panel-title{
    font-size:14px;font-weight:700;color:var(--maroon-800);
    padding:12px 16px;border-bottom:1px solid var(--line);
    letter-spacing:.01em;
  }
  .panel-title .sub{font-weight:500;color:var(--ink-soft);font-size:12px;display:block;margin-top:1px;}

  /* Table */
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    background:var(--maroon-800);color:#fff;text-align:left;
    padding:9px 10px;font-weight:600;font-size:12px;white-space:nowrap;
    position:sticky;top:0;
  }
  thead th.num, td.num{text-align:right;}
  tbody td{padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
  tbody tr:nth-child(even){background:#fbf7ee;}
  tbody tr:hover{background:var(--pink);}
  tr.group-row{cursor:pointer;font-weight:600;}
  tr.group-row td:first-child{display:flex;align-items:center;gap:6px;}
  .expand-icon{
    display:inline-flex;align-items:center;justify-content:center;
    width:14px;height:14px;font-size:11px;color:var(--maroon-700);
    transform:rotate(0deg);transition:transform .15s ease;flex:none;
  }
  tr.group-row.open .expand-icon{transform:rotate(90deg);}
  tr.detail-row{display:none;background:#fffdf6;font-size:12.3px;color:var(--ink-soft);}
  tr.detail-row.show{display:table-row;}
  tr.detail-row td{padding:5px 10px 5px 30px;border-bottom:1px dashed var(--line);}
  tr.total-row{font-weight:800;background:#f4ede0 !important;border-top:2px solid var(--maroon-800);}
  .razon-tag{
    display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;
    border-radius:20px;background:var(--pink);color:var(--maroon-800);
  }
  .pct-bad{color:var(--danger);font-weight:700;}
  .pct-warn{color:var(--warn);font-weight:700;}
  .pct-ok{color:var(--ok);font-weight:700;}

  /* Charts stack */
  .charts-col{display:flex;flex-direction:column;gap:16px;}
  .chart-box{padding:12px 16px 16px;}
  .chart-box canvas{max-height:230px;}
  .legend-row{display:flex;gap:16px;padding:0 16px 10px;font-size:12px;color:var(--ink-soft);}
  .legend-dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;}

  .empty-state{
    padding:60px 20px;text-align:center;color:var(--ink-soft);
  }
  .empty-state svg{width:46px;height:46px;opacity:.5;margin-bottom:10px;}
  .empty-state h3{margin:0 0 6px;color:var(--maroon-800);}
  .empty-state p{margin:0 0 16px;font-size:13.5px;}

  footer{
    text-align:center;font-size:11.5px;color:var(--ink-soft);
    padding:18px 0 30px;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C9 6 6 8 6 12a6 6 0 0012 0c0-4-3-6-6-10z" fill="#c8920a"/></svg>
    <div>
      <div class="brand-name">ISOPAN</div>
      <div class="brand-sub">Devolución &amp; Mala Producción</div>
    </div>
  </div>
  <div class="topbar-actions">
    <span class="status-pill" id="statusPill"><span class="status-dot off" id="statusDot"></span><span id="statusText">Sin datos</span></span>
    <button class="btn ghost" id="btnUpload">⬆ Cargar Excel</button>
    <button class="btn" id="btnExport">⬇ Exportar CSV</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
  </div>
</header>

<div class="filterbar" id="filterbar" style="display:none;">
  <div class="filter-field daterange">
    <div>
      <label>Fecha desde</label>
      <input type="date" id="fDesde" />
    </div>
    <div>
      <label>Fecha hasta</label>
      <input type="date" id="fHasta" />
    </div>
  </div>
  <div class="filter-field">
    <label>Tienda</label>
    <select id="fTienda"><option value="">Todas</option></select>
  </div>
  <div class="filter-field">
    <label>Código y nombre</label>
    <select id="fCodigo" multiple size="1"><option value="">Selección múltiple</option></select>
  </div>
  <div class="filter-field">
    <label>Mes</label>
    <select id="fMes"><option value="">Todas</option></select>
  </div>
  <div class="filter-field">
    <label>Año</label>
    <select id="fAnio"><option value="">Todas</option></select>
  </div>
  <button class="reset-filters" id="btnReset">Limpiar filtros</button>
</div>

<main id="mainArea"></main>

<footer>Panadería Isopan · Reporte de Devolución y Mala Producción</footer>

<script>
const state = {
  raw: [],           // parsed rows {fecha:Date, tienda, codigo, producto, devolucion, malaProduccion, total, razon}
  filtered: [],
  openGroups: new Set(),
  charts: {}
};

const COLOR_DEV = '#6f1c1c';
const COLOR_MP = '#d9bcbc';
const RAZON_COLORS = ['#6f1c1c','#c8920a','#8a4a2a','#4a6f6f','#9c9c9c'];

/* ---------- Utilities ---------- */
function excelSerialToDate(v){
  if (v instanceof Date) return v;
  if (typeof v === 'number'){
    const utc = XLSX.SSF.parse_date_code(v);
    return new Date(utc.y, utc.m - 1, utc.d);
  }
  const parsed = new Date(v);
  return isNaN(parsed) ? null : parsed;
}
function fmtDate(d){
  if (!d) return '';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function isoDate(d){
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${d.getFullYear()}-${mm}-${dd}`;
}
function num(v){ const n = Number(v); return isNaN(n) ? 0 : n; }
function pct(a,b){ return b > 0 ? (a/b*100) : 0; }
function fmtPct(p){ return p.toFixed(2).replace('.',',') + ' %'; }
function fmtInt(n){ return n.toLocaleString('es-GT'); }
function pctClass(p){ return p >= 8 ? 'pct-bad' : p >= 3 ? 'pct-warn' : 'pct-ok'; }

/* ---------- Column mapping (flexible header matching) ---------- */
const HEADER_MAP = {
  fecha: ['fecha'],
  tienda: ['tienda'],
  codigo: ['codigo','código'],
  producto: ['producto','descripcion','descripción'],
  devolucion: ['devolucion','devolución'],
  malaProduccion: ['mala produccion','mala producción','mala_produccion','mp'],
  total: ['total'],
  razon: ['razon','razón']
};
function findCol(headers, keys){
  const norm = h => String(h||'').trim().toLowerCase();
  const idx = headers.findIndex(h => keys.includes(norm(h)));
  return idx;
}

function parseWorkbook(ab){
  const wb = XLSX.read(ab, {type:'array', cellDates:false});
  const sheetName = wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});
  if (!rows.length) return [];
  const headers = rows[0];
  const col = {};
  for (const key in HEADER_MAP) col[key] = findCol(headers, HEADER_MAP[key]);

  const out = [];
  for (let i=1;i<rows.length;i++){
    const r = rows[i];
    if (!r || r.every(c => c===null || c==='')) continue;
    const fechaRaw = col.fecha>=0 ? r[col.fecha] : null;
    const fecha = fechaRaw!=null ? excelSerialToDate(fechaRaw) : null;
    const devolucion = col.devolucion>=0 ? num(r[col.devolucion]) : 0;
    const malaProduccion = col.malaProduccion>=0 ? num(r[col.malaProduccion]) : 0;
    const totalRaw = col.total>=0 ? r[col.total] : null;
    const total = totalRaw!=null ? num(totalRaw) : (devolucion + malaProduccion);
    out.push({
      fecha,
      tienda: col.tienda>=0 ? String(r[col.tienda]??'').trim() : '',
      codigo: col.codigo>=0 ? String(r[col.codigo]??'').trim() : '',
      producto: col.producto>=0 ? String(r[col.producto]??'').trim() : '',
      devolucion, malaProduccion, total,
      razon: col.razon>=0 ? String(r[col.razon]??'').trim() : ''
    });
  }
  return out;
}

/* ---------- Data loading ---------- */
async function loadFromRepo(){
  setStatus('loading','Buscando datos…');
  try{
    const res = await fetch('data/reporte_devolucion_pm.xlsx?v=' + Date.now(), {cache:'no-store'});
    if (!res.ok) throw new Error('not found');
    const ab = await res.arrayBuffer();
    const rows = parseWorkbook(ab);
    if (!rows.length) throw new Error('empty');
    setData(rows, 'repo');
  }catch(e){
    setStatus('off','Sin datos — carga un Excel');
    renderEmpty();
  }
}
function setStatus(kind, text){
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (kind==='ok' ? '' : kind==='loading' ? 'stale' : 'off');
  document.getElementById('statusText').textContent = text;
}
function setData(rows, source){
  state.raw = rows;
  document.getElementById('filterbar').style.display = 'flex';
  buildFilterOptions();
  applyFilters();
  const latest = rows.reduce((m,r)=> r.fecha && (!m || r.fecha>m) ? r.fecha : m, null);
  setStatus('ok', source==='repo'
    ? `Datos al ${latest ? fmtDate(latest) : '—'}`
    : `Cargado manualmente (${rows.length.toLocaleString('es-GT')} filas)`);
}

/* ---------- Filters ---------- */
function buildFilterOptions(){
  const tiendas = [...new Set(state.raw.map(r=>r.tienda).filter(Boolean))].sort();
  const codigos = [...new Map(state.raw.map(r=>[r.codigo, `${r.codigo} ${r.producto}`])).entries()]
    .filter(([c])=>c).sort((a,b)=>a[0].localeCompare(b[0]));
  const anios = [...new Set(state.raw.map(r=>r.fecha?.getFullYear()).filter(Boolean))].sort();

  const fTienda = document.getElementById('fTienda');
  fTienda.innerHTML = '<option value="">Todas</option>' + tiendas.map(t=>`<option value="${t}">${t}</option>`).join('');

  const fCodigo = document.getElementById('fCodigo');
  fCodigo.innerHTML = codigos.map(([c,label])=>`<option value="${c}">${label}</option>`).join('');

  const fAnio = document.getElementById('fAnio');
  fAnio.innerHTML = '<option value="">Todas</option>' + anios.map(a=>`<option value="${a}">${a}</option>`).join('');

  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const fMes = document.getElementById('fMes');
  fMes.innerHTML = '<option value="">Todas</option>' + meses.map((m,i)=>`<option value="${i}">${m}</option>`).join('');

  const dates = state.raw.map(r=>r.fecha).filter(Boolean);
  if (dates.length){
    const min = new Date(Math.min(...dates));
    const max = new Date(Math.max(...dates));
    document.getElementById('fDesde').value = isoDate(min);
    document.getElementById('fHasta').value = isoDate(max);
  }
}

function getFilters(){
  const desde = document.getElementById('fDesde').value ? new Date(document.getElementById('fDesde').value+'T00:00:00') : null;
  const hasta = document.getElementById('fHasta').value ? new Date(document.getElementById('fHasta').value+'T23:59:59') : null;
  const tienda = document.getElementById('fTienda').value;
  const codigos = [...document.getElementById('fCodigo').selectedOptions].map(o=>o.value).filter(Boolean);
  const mes = document.getElementById('fMes').value;
  const anio = document.getElementById('fAnio').value;
  return {desde, hasta, tienda, codigos, mes, anio};
}

function applyFilters(){
  const {desde, hasta, tienda, codigos, mes, anio} = getFilters();
  state.filtered = state.raw.filter(r=>{
    if (desde && (!r.fecha || r.fecha < desde)) return false;
    if (hasta && (!r.fecha || r.fecha > hasta)) return false;
    if (tienda && r.tienda !== tienda) return false;
    if (codigos.length && !codigos.includes(r.codigo)) return false;
    if (mes !== '' && (!r.fecha || r.fecha.getMonth() !== Number(mes))) return false;
    if (anio !== '' && (!r.fecha || r.fecha.getFullYear() !== Number(anio))) return false;
    return true;
  });
  renderAll();
}

['fDesde','fHasta','fTienda','fCodigo','fMes','fAnio'].forEach(id=>{
  document.getElementById(id).addEventListener('change', applyFilters);
});
document.getElementById('btnReset').addEventListener('click', ()=>{
  document.getElementById('fTienda').value = '';
  document.getElementById('fMes').value = '';
  document.getElementById('fAnio').value = '';
  [...document.getElementById('fCodigo').options].forEach(o=>o.selected=false);
  buildFilterOptions();
  applyFilters();
});

/* ---------- Aggregation ---------- */
function groupByCodigo(rows){
  const map = new Map();
  for (const r of rows){
    const key = r.codigo || '(sin código)';
    if (!map.has(key)){
      map.set(key, {
        codigo:r.codigo, producto:r.producto,
        devolucion:0, malaProduccion:0, total:0,
        firstFecha:null, firstRazon:'', rows:[]
      });
    }
    const g = map.get(key);
    g.devolucion += r.devolucion;
    g.malaProduccion += r.malaProduccion;
    g.total += r.total;
    g.rows.push(r);
    if (r.fecha && (!g.firstFecha || r.fecha < g.firstFecha)){
      g.firstFecha = r.fecha;
      g.firstRazon = r.razon;
    }
  }
  return [...map.values()].sort((a,b)=>b.total-a.total);
}
function groupByRazon(rows){
  const map = new Map();
  for (const r of rows){
    const key = r.razon || '(en blanco)';
    map.set(key, (map.get(key)||0) + r.total);
  }
  return [...map.entries()].sort((a,b)=>b[1]-a[1]);
}

/* ---------- Rendering ---------- */
function renderEmpty(){
  document.getElementById('filterbar').style.display = 'none';
  document.getElementById('mainArea').innerHTML = `
    <div class="panel" style="grid-column:1/-1;">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6f1c1c" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 4v16"/></svg>
        <h3>Todavía no hay datos cargados</h3>
        <p>Sube el archivo <strong>reporte_devolucion_pm.xlsx</strong> a la carpeta <code>data/</code> del repositorio, o cárgalo manualmente con el botón "⬆ Cargar Excel".</p>
      </div>
    </div>`;
}

function ensureLayout(){
  if (document.getElementById('tblBody')) return;
  document.getElementById('mainArea').innerHTML = `
    <div class="panel">
      <div class="panel-title">Devolución y Mala Producción por Código y nombre
        <span class="sub" id="rangeLabel"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Código y nombre</th>
              <th class="num">Cant recib x MP</th>
              <th class="num">Cant recib x vencimiento</th>
              <th class="num">Suma de total</th>
              <th class="num">% devol</th>
              <th class="num">% de PM</th>
              <th>Primera fecha: razón</th>
            </tr>
          </thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>
    <div class="charts-col">
      <div class="panel chart-box">
        <div class="panel-title" style="padding:0 0 10px;border:none;">Suma de devolución y Suma de mala_produccion por Código y nombre</div>
        <div class="legend-row">
          <span><span class="legend-dot" style="background:${COLOR_DEV}"></span>Suma devolución</span>
          <span><span class="legend-dot" style="background:${COLOR_MP}"></span>Suma mala_produccion</span>
        </div>
        <canvas id="chartBars"></canvas>
      </div>
      <div class="panel chart-box">
        <div class="panel-title" style="padding:0 0 10px;border:none;">Suma de total por razón</div>
        <canvas id="chartRazon"></canvas>
      </div>
      <div class="panel chart-box">
        <div class="panel-title" style="padding:0 0 10px;border:none;">Suma de devolución y Suma de mala_produccion</div>
        <canvas id="chartDonut"></canvas>
      </div>
    </div>`;

  document.getElementById('tblBody').addEventListener('click', (e)=>{
    const row = e.target.closest('tr.group-row');
    if (!row) return;
    const key = row.dataset.key;
    if (state.openGroups.has(key)) state.openGroups.delete(key); else state.openGroups.add(key);
    renderTable(groupByCodigo(state.filtered));
  });
}

function renderTable(groups){
  const tbody = document.getElementById('tblBody');
  let totDev=0, totMp=0, totTotal=0;
  let html = '';
  for (const g of groups){
    totDev += g.devolucion; totMp += g.malaProduccion; totTotal += g.total;
    const pDev = pct(g.devolucion, g.total);
    const pMp = pct(g.malaProduccion, g.total);
    const open = state.openGroups.has(g.codigo);
    html += `<tr class="group-row ${open?'open':''}" data-key="${g.codigo}">
      <td><span class="expand-icon">▶</span>${g.codigo} ${g.producto}</td>
      <td class="num">${fmtInt(g.malaProduccion)}</td>
      <td class="num">${fmtInt(g.devolucion)}</td>
      <td class="num">${fmtInt(g.total)}</td>
      <td class="num"><span class="${pctClass(pDev)}">${fmtPct(pDev)}</span></td>
      <td class="num"><span class="${pctClass(pMp)}">${fmtPct(pMp)}</span></td>
      <td><span class="razon-tag">${g.firstRazon || '—'}</span> ${g.firstFecha ? fmtDate(g.firstFecha):''}</td>
    </tr>`;
    if (open){
      const sortedRows = [...g.rows].sort((a,b)=> (a.fecha||0) - (b.fecha||0));
      for (const r of sortedRows){
        html += `<tr class="detail-row show">
          <td colspan="2">${r.tienda || '—'}</td>
          <td class="num">${fmtInt(r.devolucion)}</td>
          <td class="num">${fmtInt(r.malaProduccion)}</td>
          <td class="num">${fmtInt(r.total)}</td>
          <td colspan="2">${fmtDate(r.fecha)} · ${r.razon || '—'}</td>
        </tr>`;
      }
    }
  }
  const pDevT = pct(totDev, totTotal), pMpT = pct(totMp, totTotal);
  html += `<tr class="total-row">
    <td>Total</td>
    <td class="num">${fmtInt(totMp)}</td>
    <td class="num">${fmtInt(totDev)}</td>
    <td class="num">${fmtInt(totTotal)}</td>
    <td class="num">${fmtPct(pDevT)}</td>
    <td class="num">${fmtPct(pMpT)}</td>
    <td>${groupByRazon(state.filtered)[0]?.[0] || '—'}</td>
  </tr>`;
  tbody.innerHTML = html || `<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--ink-soft);">No hay resultados con estos filtros</td></tr>`;
}

function renderCharts(groups){
  const top = groups.slice(0, 10);
  const labels = top.map(g => `${g.codigo}`);
  const fullLabels = top.map(g => `${g.codigo} ${g.producto}`);

  destroyChart('chartBars');
  state.charts.chartBars = new Chart(document.getElementById('chartBars'), {
    type:'bar',
    data:{ labels, datasets:[
      {label:'Suma devolución', data:top.map(g=>g.devolucion), backgroundColor:COLOR_DEV, borderRadius:3, maxBarThickness:26},
      {label:'Suma mala_produccion', data:top.map(g=>g.malaProduccion), backgroundColor:COLOR_MP, borderRadius:3, maxBarThickness:26}
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ title:(items)=>fullLabels[items[0].dataIndex] } } },
      scales:{ x:{grid:{display:false}}, y:{beginAtZero:true, grid:{color:'#f0e8d8'}} }
    }
  });

  const razonData = groupByRazon(state.filtered);
  destroyChart('chartRazon');
  state.charts.chartRazon = new Chart(document.getElementById('chartRazon'), {
    type:'bar',
    data:{ labels: razonData.map(r=>r[0]), datasets:[{
      data: razonData.map(r=>r[1]),
      backgroundColor: razonData.map((_,i)=>RAZON_COLORS[i % RAZON_COLORS.length]),
      borderRadius:3, maxBarThickness:20
    }]},
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ x:{beginAtZero:true, grid:{color:'#f0e8d8'}}, y:{grid:{display:false}} }
    }
  });

  const totDev = state.filtered.reduce((s,r)=>s+r.devolucion,0);
  const totMp = state.filtered.reduce((s,r)=>s+r.malaProduccion,0);
  destroyChart('chartDonut');
  state.charts.chartDonut = new Chart(document.getElementById('chartDonut'), {
    type:'doughnut',
    data:{ labels:['Suma devolución','Suma mala_produccion'], datasets:[{
      data:[totDev, totMp], backgroundColor:[COLOR_DEV, COLOR_MP], borderWidth:0
    }]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{ legend:{position:'bottom', labels:{boxWidth:10, font:{size:11}}} }
    }
  });
}
function destroyChart(key){ if (state.charts[key]) state.charts[key].destroy(); }

function renderAll(){
  if (!state.raw.length){ renderEmpty(); return; }
  ensureLayout();
  const groups = groupByCodigo(state.filtered);
  renderTable(groups);
  renderCharts(groups);
  const {desde, hasta} = getFilters();
  document.getElementById('rangeLabel').textContent = desde && hasta ? `${fmtDate(desde)} – ${fmtDate(hasta)}` : '';
}

/* ---------- Manual upload ---------- */
document.getElementById('btnUpload').addEventListener('click', ()=> document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if (!file) return;
  const ab = await file.arrayBuffer();
  const rows = parseWorkbook(ab);
  if (!rows.length){ alert('No se pudo leer el archivo. Verifica que tenga las columnas esperadas.'); return; }
  setData(rows, 'manual');
});

/* ---------- Export CSV ---------- */
document.getElementById('btnExport').addEventListener('click', ()=>{
  if (!state.filtered.length){ alert('No hay datos filtrados para exportar.'); return; }
  const groups = groupByCodigo(state.filtered);
  const header = ['Codigo','Producto','Cant recib x MP','Cant recib x vencimiento','Suma de total','% devol','% de PM','Primera fecha','Razon'];
  const lines = [header.join(',')];
  for (const g of groups){
    lines.push([
      g.codigo, `"${g.producto}"`, g.malaProduccion, g.devolucion, g.total,
      pct(g.devolucion,g.total).toFixed(2), pct(g.malaProduccion,g.total).toFixed(2),
      g.firstFecha?fmtDate(g.firstFecha):'', g.firstRazon
    ].join(','));
  }
  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `devolucion_pm_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
});

/* ---------- Init ---------- */
loadFromRepo();
</script>
